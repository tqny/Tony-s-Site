<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Shield -->
  <g transform="translate(0, 2)">
    <!-- Shield outline -->
    <path d="M28 4 L52 4 L52 32 Q52 48 40 54 Q28 48 28 32 Z" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none"/>
    <!-- Shield horizontal divider -->
    <line x1="28" y1="22" x2="52" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <!-- Shield vertical divider -->
    <line x1="40" y1="4" x2="40" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <!-- Book (top-left quadrant) -->
    <path d="M32 9 L38 9 L38 19 L35 17 L32 19 Z" stroke="rgba(255,255,255,0.55)" stroke-width="0.8" fill="none"/>
    <!-- Globe (top-right quadrant) -->
    <circle cx="46" cy="13" r="4.5" stroke="rgba(255,255,255,0.55)" stroke-width="0.8" fill="none"/>
    <ellipse cx="46" cy="13" rx="2" ry="4.5" stroke="rgba(255,255,255,0.4)" stroke-width="0.6" fill="none"/>
    <line x1="41.5" y1="13" x2="50.5" y2="13" stroke="rgba(255,255,255,0.4)" stroke-width="0.6"/>
    <!-- Cross-hatching (bottom half) -->
    <line x1="32" y1="28" x2="36" y2="24" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="36" y1="28" x2="40" y2="24" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="40" y1="28" x2="44" y2="24" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="44" y1="28" x2="48" y2="24" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="32" y1="32" x2="36" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="36" y1="32" x2="40" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="40" y1="32" x2="44" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
    <line x1="44" y1="32" x2="48" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="64" y="28" font-family="'Playfair Display', 'Georgia', serif" font-size="22" font-weight="400" letter-spacing="0.5" fill="rgba(255,255,255,0.85)">Johns Hopkins</text>
  <text x="64" y="50" font-family="'Playfair Display', 'Georgia', serif" font-size="16" font-weight="400" font-style="italic" letter-spacing="1.5" fill="rgba(255,255,255,0.5)">University</text>
</svg>