<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0A0A0A"/>

  <!-- Subtle radial glow behind robot -->
  <defs>
    <radialGradient id="glow" cx="400" cy="260" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="visor-shine" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <circle cx="400" cy="260" r="200" fill="url(#glow)"/>

  <!-- Body -->
  <rect x="348" y="250" width="104" height="120" rx="16" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Body chest highlight -->
  <rect x="370" y="268" width="60" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

  <!-- Body center detail lines -->
  <line x1="380" y1="290" x2="420" y2="290" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="385" y1="300" x2="415" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="390" y1="310" x2="410" y2="310" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left arm (resting) -->
  <rect x="322" y="265" width="22" height="70" rx="11" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Left hand -->
  <circle cx="333" cy="342" r="10" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Right arm (raised, waving) -->
  <g transform="rotate(-45, 456, 265)">
    <rect x="445" y="235" width="22" height="70" rx="11" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  </g>

  <!-- Right hand (waving, at end of raised arm) -->
  <circle cx="498" cy="210" r="12" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Wave lines near hand -->
  <path d="M520 195 C528 192, 535 196, 535 200" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M522 208 C532 206, 540 210, 539 216" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M525 185 C534 181, 543 185, 542 190" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Neck -->
  <rect x="385" y="235" width="30" height="20" rx="6" fill="#161616" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Head -->
  <rect x="355" y="145" width="90" height="95" rx="20" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Visor / face screen -->
  <rect x="370" y="168" width="60" height="38" rx="10" fill="#111111" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="370" y="168" width="60" height="38" rx="10" fill="url(#visor-shine)"/>

  <!-- Eyes (two soft glowing dots) -->
  <circle cx="388" cy="187" r="5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="412" cy="187" r="5" fill="rgba(255,255,255,0.7)"/>

  <!-- Eye glow -->
  <circle cx="388" cy="187" r="8" fill="rgba(255,255,255,0.04)"/>
  <circle cx="412" cy="187" r="8" fill="rgba(255,255,255,0.04)"/>

  <!-- Antenna -->
  <line x1="400" y1="145" x2="400" y2="122" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="400" cy="118" r="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Antenna glow -->
  <circle cx="400" cy="118" r="9" fill="rgba(255,255,255,0.03)"/>

  <!-- Legs -->
  <rect x="368" y="370" width="24" height="55" rx="10" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="408" y="370" width="24" height="55" rx="10" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Feet -->
  <rect x="362" y="418" width="36" height="16" rx="8" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <rect x="402" y="418" width="36" height="16" rx="8" fill="#1C1C1C" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Floor reflection line -->
  <line x1="300" y1="445" x2="500" y2="445" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Scattered dot particles (matching Three.js hero vibe) -->
  <circle cx="120" cy="80" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="680" cy="120" r="1.5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="90" cy="350" r="1.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="710" cy="380" r="2" fill="rgba(255,255,255,0.12)"/>
  <circle cx="200" cy="460" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="600" cy="450" r="1.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="150" cy="200" r="1" fill="rgba(255,255,255,0.08)"/>
  <circle cx="650" cy="250" r="1.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="250" cy="50" r="1.5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="550" cy="60" r="2" fill="rgba(255,255,255,0.08)"/>
  <circle cx="730" cy="50" r="1" fill="rgba(255,255,255,0.06)"/>
  <circle cx="60" cy="460" r="1" fill="rgba(255,255,255,0.06)"/>
  <circle cx="740" cy="460" r="1.5" fill="rgba(255,255,255,0.08)"/>
  <circle cx="300" cy="470" r="1" fill="rgba(255,255,255,0.06)"/>
  <circle cx="500" cy="30" r="1.5" fill="rgba(255,255,255,0.08)"/>
</svg>
